# =============================================================================
# Global settings
# =============================================================================
# MQTT broker host / IP
MQTTHOST=192.168.1.2
# MQTT topic prefix (combined with each pack's ID below)
TOPIC=seplos
# MQTT username
MQTTUSER=mqttuser
# MQTT password
MQTTPASWD=mqttpassword
# Seconds between polling cycles. Each cycle queries every pack once.
# Not used by run_bms_query_ha.sh (HA automation drives the cadence).
TELEPERIOD=10
# Optional log file path. Leave empty to log only to stdout.
# Example: LOGFILE=/home/pi/SEPLOS_MQTT/BMS_error.log
LOGFILE=
# Max size in bytes of the log file and nohup.out before they get rotated
MAXSIZE=2000000
# Cell voltage sanity bounds in mV (readings outside this range are skipped)
CELL_MIN_VOLT=2500
CELL_MAX_VOLT=3800

# =============================================================================
# Pack list — comma-separated. Each name needs a matching block below.
# =============================================================================
PACKS=pack1

# -----------------------------------------------------------------------------
# pack1 (master) — typical single-pack setup
# -----------------------------------------------------------------------------
pack1_DEV=/dev/ttyUSB0
# Seplos: 19200 for v16/v3, 9600 for older v2
pack1_BAUD=19200
# Protocol address, two hex chars (00 = master)
pack1_ADDR=00
# ID appended to MQTT topic and HA unique_id (must be unique per pack)
pack1_ID=364715398511
# Friendly device name shown in Home Assistant
pack1_NAME=Master

# -----------------------------------------------------------------------------
# Example second pack — uncomment + add to PACKS above to enable.
# -----------------------------------------------------------------------------
#pack2_DEV=/dev/ttyUSB1
#pack2_BAUD=19200
#pack2_ADDR=01
#pack2_ID=364715398512
